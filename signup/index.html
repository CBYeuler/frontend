<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
        <div class="container" id="container">
 
        <!-- Sliding teal panel -->
        <div class="green-bg">
            <div class="banner" id="banner">
                <h1>Hello Friend!</h1>
                <p>Enter your details and start your journey with us</p>
            </div>
            <button type="button" id="toggleBtn">Sign In</button>
        </div>
 
        <!-- Sign Up Form -->
        <form class="form-panel signup-form" novalidate>
            <h1>Create Account</h1>
            <div class="social-media">
                <a href="#" aria-label="Sign up with Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="#" aria-label="Sign up with Instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" aria-label="Sign up with LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            </div>
            <span class="divider">or use your email for registration</span>
            <div class="inputs">
                <div class="input-group">
                    <input type="text" placeholder="Name" autocomplete="name">
                    <i class="fas fa-user"></i>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Email" autocomplete="email">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" autocomplete="new-password">
                    <i class="fas fa-lock"></i>
                </div>
            </div>
            <button type="submit" class="submit-btn">Sign Up</button>
        </form>
 
        <!-- Sign In Form -->
        <form class="form-panel login-form" novalidate>
            <h1>Welcome Back</h1>
            <div class="social-media">
                <a href="#" aria-label="Sign in with Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="#" aria-label="Sign in with Instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" aria-label="Sign in with LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            </div>
            <span class="divider">or use your email to sign in</span>
            <div class="inputs">
                <div class="input-group">
                    <input type="email" placeholder="Email" autocomplete="email">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" autocomplete="current-password">
                    <i class="fas fa-lock"></i>
                </div>
            </div>
            <a href="#" class="forgot">Forgot your password?</a>
            <button type="submit" class="submit-btn">Sign In</button>
        </form>
 
    </div>
    <script src="script.js"></script>
</body>
</html>
